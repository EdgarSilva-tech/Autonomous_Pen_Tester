global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector metrics exporter
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # LiteLLM Proxy Prometheus metrics endpoint
  - job_name: litellm-proxy
    static_configs:
      - targets: ["litellm-proxy:4000"]
    metrics_path: /metrics
    authorization:
      credentials: sk-pentest-master

  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
