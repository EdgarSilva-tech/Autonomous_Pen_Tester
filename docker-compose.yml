services:

  # ── Target application (challenge target — real app under test) ──────────
  target-app:
    build:
      context: ./target-app/target-app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TOKEN_TTL_SECONDS: "300"
      MAX_FAILED_LOGINS: "3"
      LOCKOUT_SECONDS: "30"
      FLAKY_RATE: "0.0"
    # Dockerfile already embeds a Python-based healthcheck; no override needed.
    networks:
      - pentest-net

  # ── Shared PostgreSQL with pgvector extension ─────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pentest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentest}
      POSTGRES_DB: pentest
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pentest}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pentest-net

  # ── Redis (LiteLLM semantic cache) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pentest-net

  # ── LiteLLM AI Gateway (proxy + UI) ───────────────────────────────────────
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-pentest-master}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pentest}:${POSTGRES_PASSWORD:-pentest}@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pentest-net

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    ports:
      - "4317:4317"   # OTLP gRPC (internal)
      - "8889:8889"   # Prometheus metrics exporter
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - grafana-tempo
    networks:
      - pentest-net

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    networks:
      - pentest-net

  # ── Grafana Tempo (distributed traces) ────────────────────────────────────
  grafana-tempo:
    image: grafana/tempo:2.4.1
    ports:
      - "3200:3200"   # Tempo HTTP
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - pentest-net

  # ── Grafana (dashboards) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - grafana-tempo
    networks:
      - pentest-net

  # ── Playwright scraper microservice ───────────────────────────────────────
  # Isolated service so the ~400 MB browser binary never enters the agent image.
  # The agent calls POST http://scraper:9222/scrape for dynamic DOM analysis.
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    ports:
      - "9222:9222"
    environment:
      PORT: "9222"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: scraper
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - pentest-net

  # ── Pentesting Agent ──────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Target
      TARGET_BASE_URL: http://target-app:8000
      AGENT_USERNAME: ${AGENT_USERNAME}
      AGENT_PASSWORD: ${AGENT_PASSWORD}
      AGENT_NEW_PASSWORD: ${AGENT_NEW_PASSWORD:-}
      # LiteLLM Gateway
      LITELLM_BASE_URL: http://litellm-proxy:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-pentest-master}
      # Database (all three DBs share one host)
      LANGGRAPH_DB_URI: postgresql+asyncpg://${POSTGRES_USER:-pentest}:${POSTGRES_PASSWORD:-pentest}@postgres:5432/langgraph
      MEMORY_DB_URI: postgresql+asyncpg://${POSTGRES_USER:-pentest}:${POSTGRES_PASSWORD:-pentest}@postgres:5432/pentest_memory
      # Playwright scraper service
      SCRAPER_BASE_URL: http://scraper:9222
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: autonomous-pen-tester
      # Summarise / graph tuning
      SUMMARY_THRESHOLD: ${SUMMARY_THRESHOLD:-30}
      SUMMARY_RECENT_KEEP: ${SUMMARY_RECENT_KEEP:-12}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REPORT_OUTPUT_PATH: /app/output/report.json
    volumes:
      - ./output:/app/output
    depends_on:
      target-app:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
      postgres:
        condition: service_healthy
      scraper:
        condition: service_healthy
    networks:
      - pentest-net

volumes:
  postgres-data:
  prometheus-data:
  tempo-data:
  grafana-data:

networks:
  pentest-net:
    driver: bridge
